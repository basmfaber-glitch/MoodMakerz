<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MoodMakerz</title>

<style>
  :root{
    --ink:#11131a;
    --muted: rgba(17,19,26,0.62);
    --shadow: 0 18px 55px rgba(17,19,26,.10);
    --shadow-soft: 0 10px 26px rgba(17,19,26,.08);
    --r: 22px;

    --mood-accent: rgba(95,120,200,0.62);
    --mood-accent2: rgba(105,165,150,0.54);
    --mood-wash: rgba(95,120,200,0.10);
  }

  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial;
    color:var(--ink);
    overflow-x:hidden;
    background:#f3f4f7;
  }

  .haze{
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(1100px 720px at 14% 18%, rgba(190, 200, 220, 0.30), transparent 62%),
      radial-gradient(1000px 760px at 86% 22%, rgba(210, 190, 160, 0.24), transparent 62%),
      radial-gradient(1100px 820px at 50% 115%, rgba(170, 215, 205, 0.18), transparent 62%),
      linear-gradient(180deg, #f4f6fa 0%, #f1f2f6 55%, #eceff5 100%);
  }
  .blob{
    position:fixed;
    width:640px; height:640px;
    border-radius:999px;
    filter: blur(56px);
    opacity: .38;
    z-index:1;
    pointer-events:none;
    mix-blend-mode: multiply;
    animation: drift 16s ease-in-out infinite alternate;
  }
  .b1{ left:-300px; top:-220px; background: radial-gradient(circle at 30% 30%, rgba(190,200,220,.75), transparent 66%); }
  .b2{ right:-330px; top:-40px; background: radial-gradient(circle at 30% 30%, rgba(210,190,160,.70), transparent 66%); animation-duration: 18s; }
  .b3{ left:18%; bottom:-380px; background: radial-gradient(circle at 30% 30%, rgba(170,215,205,.62), transparent 66%); animation-duration: 20s; }

  @keyframes drift{
    from{ transform: translate3d(-12px, -10px, 0) scale(1.01); }
    to{ transform: translate3d(18px, 14px, 0) scale(1.07); }
  }

  .grain{
    position:fixed; inset:0; z-index:2; pointer-events:none;
    opacity:.05;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,0,0,0.40) 0 0.55px, transparent 1px),
      radial-gradient(circle at 80% 40%, rgba(0,0,0,0.40) 0 0.55px, transparent 1px),
      radial-gradient(circle at 55% 75%, rgba(0,0,0,0.40) 0 0.55px, transparent 1px);
    background-size: 120px 120px;
  }

  .wrap{ position:relative; z-index:3; min-height:100vh; display:flex; flex-direction:column; }
  .container{
    width:100%;
    max-width:1380px;
    margin:0 auto;
    padding:26px 22px 22px;
    flex:1;
  }

  .topbar{
    position:sticky; top:0; z-index:20;
    margin:-26px -22px 16px;
    padding:18px 22px 14px;
    background: linear-gradient(180deg, rgba(244,246,250,0.86), rgba(244,246,250,0.72) 65%, rgba(244,246,250,0));
    backdrop-filter: blur(14px);
    border-bottom:1px solid rgba(17,19,26,0.06);
  }
  .hero{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
  }
  h1{
    margin:0;
    font-size:34px;
    letter-spacing:-0.02em;
    line-height:1.05;
    font-weight:950;
    color: rgba(17,19,26,0.92);
  }
  .tagline{
    margin:6px 0 0;
    font-weight:900;
    color: rgba(17,19,26,0.70);
    font-size:13px;
  }
  .subline{
    margin:6px 0 0;
    color: rgba(17,19,26,0.58);
    font-weight:850;
    font-size:12px;
    line-height:1.35;
  }
  .hero-right{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

  .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:12px; }
  .moods{ display:flex; gap:8px; flex-wrap:wrap; }

  .pillbtn{
    padding:8px 12px;
    border-radius:999px;
    background: rgba(255,255,255,0.62);
    border:1px solid rgba(17,19,26,0.10);
    cursor:pointer;
    font-size:12.5px;
    font-weight:900;
    color: rgba(17,19,26,0.82);
    user-select:none;
    transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  .pillbtn:hover{
    transform: translateY(-1px);
    border-color: rgba(17,19,26,0.16);
    box-shadow: 0 10px 20px rgba(17,19,26,0.08);
  }
  .pillbtn.active{
    background: linear-gradient(90deg, var(--mood-accent), var(--mood-accent2));
    border-color: rgba(17,19,26,0.14);
    color: rgba(17,19,26,0.92);
    box-shadow: 0 12px 26px rgba(17,19,26,0.10);
    position:relative;
  }
  .pillbtn.active::after{
    content:"";
    position:absolute;
    left:18px; right:18px; bottom:-7px;
    height:3px;
    border-radius:999px;
    background: linear-gradient(90deg, var(--mood-accent), var(--mood-accent2));
    opacity:.55;
  }

  body.mood-Stressed{  --mood-accent: rgba(95,120,200,0.60); --mood-accent2: rgba(105,165,150,0.52); --mood-wash: rgba(95,120,200,0.10); }
  body.mood-Happy{     --mood-accent: rgba(200,150,95,0.60); --mood-accent2: rgba(185,130,155,0.46); --mood-wash: rgba(200,150,95,0.10); }
  body.mood-Energetic{ --mood-accent: rgba(85,165,150,0.62); --mood-accent2: rgba(200,160,95,0.46); --mood-wash: rgba(85,165,150,0.10); }
  body.mood-Creative{  --mood-accent: rgba(175,130,160,0.56); --mood-accent2: rgba(110,130,205,0.48); --mood-wash: rgba(175,130,160,0.10); }
  body.mood-Tired{     --mood-accent: rgba(120,130,155,0.54); --mood-accent2: rgba(155,140,180,0.44); --mood-wash: rgba(120,130,155,0.10); }
  body.mood-Cozy{      --mood-accent: rgba(170,125,95,0.58); --mood-accent2: rgba(145,120,95,0.46); --mood-wash: rgba(170,125,95,0.10); }
  body.mood-Focused{   --mood-accent: rgba(90,125,150,0.60); --mood-accent2: rgba(110,150,135,0.46); --mood-wash: rgba(90,125,150,0.10); }

  .grid{
    margin-top:14px;
    display:grid;
    grid-template-columns: 1.15fr repeat(3, minmax(0, 1fr));
    gap:16px;
    padding:6px 0 14px;
  }
  @media (max-width:1280px){ .grid{ grid-template-columns: repeat(3, minmax(0,1fr)); } }
  @media (max-width:900px){ .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (max-width:540px){ .grid{ grid-template-columns: 1fr; } }

  .card{
    position:relative;
    border-radius: var(--r);
    border:1px solid rgba(17,19,26,0.10);
    background: linear-gradient(180deg, rgba(255,255,255,0.76), rgba(255,255,255,0.58));
    box-shadow: var(--shadow-soft);
    padding:14px;
    display:flex;
    flex-direction:column;
    gap:12px;
    overflow:hidden;
    min-height:372px;
    backdrop-filter: blur(10px);
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }
  .card:hover{
    transform: translateY(-3px);
    box-shadow: var(--shadow);
    border-color: rgba(17,19,26,0.14);
  }
  .card::before{
    content:"";
    position:absolute; inset:-2px; pointer-events:none;
    opacity:.95;
    background:
      radial-gradient(760px 480px at 24% 18%, var(--mood-wash), transparent 64%),
      radial-gradient(760px 460px at 82% 86%, rgba(255,255,255,0.10), transparent 62%);
  }
  .card > *{ position:relative; z-index:1; }

  .cardhead{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .badge{
    font-size:11px;
    font-weight:950;
    letter-spacing:.02em;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(17,19,26,0.10);
    background: rgba(255,255,255,0.62);
    color: rgba(17,19,26,0.80);
  }
  .count{
    font-size:11px;
    color: rgba(17,19,26,0.54);
    font-weight:950;
    white-space:nowrap;
  }

  .stack{ display:flex; flex-direction:column; gap:10px; }

  .section{
    border-radius: 18px;
    padding: 12px;
    border:1px solid rgba(17,19,26,0.08);
    background: rgba(255,255,255,0.50);
    transition: transform .14s ease, border-color .14s ease, box-shadow .14s ease;
  }
  .section:hover{
    transform: translateY(-1px);
    box-shadow: 0 10px 18px rgba(17,19,26,0.06);
  }

  .label{
    font-size:11px;
    font-weight:950;
    color: rgba(17,19,26,0.74);
    margin: 0 0 6px;
    padding: 6px 9px;
    border-radius: 999px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    border: 1px solid rgba(17,19,26,0.10);
    background: rgba(255,255,255,0.46);
  }
  .dot{ width:8px; height:8px; border-radius:999px; background: rgba(17,19,26,0.55); }
  .label[data-k="product"] .dot{ background: rgba(95,120,200,0.84); }
  .label[data-k="eat"] .dot{ background: rgba(105,165,150,0.84); }
  .label[data-k="do"] .dot{ background: rgba(200,150,95,0.78); }
  .label[data-k="watch"] .dot{ background: rgba(175,130,160,0.74); }

  .label[data-k="product"]::after{ content:"🛍️"; font-size:12px; opacity:.62; }
  .label[data-k="eat"]::after{ content:"🍵"; font-size:12px; opacity:.62; }
  .label[data-k="do"]::after{ content:"⏱️"; font-size:12px; opacity:.62; }
  .label[data-k="watch"]::after{ content:"🎬"; font-size:12px; opacity:.62; }

  .value{
    font-size: 13px;
    line-height: 1.35;
    font-weight: 900;
    color: rgba(17,19,26,0.90);
    margin: 0;
    overflow:hidden;
    display:-webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }
  .value.short{ -webkit-line-clamp: 2; }

  a.buy-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    margin-top:10px;
    padding:7px 10px;
    border-radius:999px;
    text-decoration:none;
    font-weight:950;
    font-size:12px;
    color: rgba(17,19,26,0.86);
    background: rgba(255,255,255,0.56);
    border:1px solid rgba(17,19,26,0.10);
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    width: fit-content;
  }
  a.buy-pill:hover{
    transform: translateY(-1px);
    border-color: rgba(17,19,26,0.16);
    box-shadow: 0 12px 22px rgba(17,19,26,0.10);
  }
  .buy-ic{
    width:18px; height:18px; border-radius:7px;
    background: linear-gradient(135deg, var(--mood-accent), var(--mood-accent2));
    box-shadow: 0 10px 18px rgba(17,19,26,0.10);
    flex:0 0 auto;
  }

  a.watchlink{
    display:inline-block;
    margin-top:8px;
    font-weight:950;
    font-size:12px;
    color: rgba(17,19,26,0.72);
    text-decoration:none;
    border-bottom:1px dashed rgba(17,19,26,0.32);
  }
  a.watchlink:hover{ color: rgba(17,19,26,0.92); border-bottom-color: rgba(17,19,26,0.55); }

  .card.highlight{
    outline: 2px solid rgba(17,19,26,0.06);
    border-color: rgba(17,19,26,0.14);
  }
  .top-pick{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-top:-2px;
  }
  .top-pick .tp{
    font-weight:980;
    font-size:12px;
    color: rgba(17,19,26,0.82);
    letter-spacing:.01em;
  }
  .tp-pill{
    font-size:11px;
    font-weight:950;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid rgba(17,19,26,0.12);
    background: linear-gradient(90deg, rgba(255,255,255,0.62), rgba(255,255,255,0.40));
    color: rgba(17,19,26,0.70);
    white-space:nowrap;
  }
  .why{
    border-radius: 18px;
    border:1px solid rgba(17,19,26,0.08);
    background: rgba(255,255,255,0.46);
    padding: 10px 12px;
  }
  .why .wlabel{
    font-weight:950; font-size:11px; color: rgba(17,19,26,0.70);
    margin-bottom:6px;
  }
  .why .wtext{
    margin:0;
    font-weight:900;
    font-size:13px;
    color: rgba(17,19,26,0.90);
    line-height:1.35;
  }

  .fun{
    position:relative;
    margin: 8px 0 10px;
    border-radius: 28px;
    border: 1px solid rgba(17,19,26,0.10);
    background: linear-gradient(180deg, rgba(255,255,255,0.70), rgba(255,255,255,0.56));
    box-shadow: var(--shadow-soft);
    overflow:hidden;
    padding: 16px 16px;
    backdrop-filter: blur(10px);
  }
  .fun::before{
    content:"";
    position:absolute;
    inset:-140px;
    background:
      radial-gradient(900px 560px at 22% 20%, var(--mood-wash), transparent 62%),
      radial-gradient(900px 560px at 80% 85%, rgba(255,255,255,0.10), transparent 62%);
    opacity:.95;
    animation: drift2 12s ease-in-out infinite alternate;
  }
  @keyframes drift2{
    from{ transform: translate3d(-10px, -6px, 0) scale(1.02); }
    to{ transform: translate3d(10px, 8px, 0) scale(1.06); }
  }

  .fun-inner{
    position:relative; z-index:1;
    display:grid;
    grid-template-columns: 1.6fr 1fr;
    gap:16px;
    align-items:stretch;
  }
  @media (max-width:900px){ .fun-inner{ grid-template-columns: 1fr; } }

  .fun-card{
    border-radius: 22px;
    border: 1px solid rgba(17,19,26,0.10);
    background: rgba(255,255,255,0.56);
    padding: 14px;
  }
  .fun-title{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    margin-bottom:12px;
  }
  .fun-title h2{
    margin:0;
    font-size: 16px;
    font-weight: 980;
    letter-spacing:-0.01em;
    color: rgba(17,19,26,0.92);
  }
  .pill{
    font-size: 11px;
    font-weight: 950;
    padding: 6px 10px;
    border-radius: 999px;
    border:1px solid rgba(17,19,26,0.12);
    background: rgba(255,255,255,0.66);
    color: rgba(17,19,26,0.70);
    white-space:nowrap;
  }
  .fun-actions{
    display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px;
  }
  .mini-btn{
    padding:8px 10px;
    border-radius:999px;
    border:1px solid rgba(17,19,26,0.12);
    background: rgba(255,255,255,0.62);
    cursor:pointer;
    font-weight:950;
    font-size:12px;
    color: rgba(17,19,26,0.78);
    transition: transform .12s ease, box-shadow .12s ease, border-color .12s ease;
    user-select:none;
  }
  .mini-btn:hover{
    transform: translateY(-1px);
    border-color: rgba(17,19,26,0.16);
    box-shadow: 0 10px 18px rgba(17,19,26,0.10);
  }

  .songs{
    display:grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap:10px;
  }
  @media (max-width:900px){ .songs{ grid-template-columns: 1fr; } }

  .song{
    display:flex; align-items:flex-start; gap:10px;
    padding: 10px 12px;
    border-radius: 18px;
    border: 1px solid rgba(17,19,26,0.10);
    background: rgba(255,255,255,0.62);
    box-shadow: 0 10px 18px rgba(17,19,26,0.06);
  }
  .song .note{
    width:26px; height:26px; border-radius: 10px; flex:0 0 auto;
    background: linear-gradient(135deg, var(--mood-accent), var(--mood-accent2));
    box-shadow: 0 10px 18px rgba(17,19,26,0.10);
  }
  .song .meta{ min-width:0; }
  .song .title{
    font-weight: 950;
    font-size: 12.8px;
    color: rgba(17,19,26,0.90);
    margin: 0 0 4px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .song a{
    font-weight: 900;
    font-size: 12px;
    color: rgba(17,19,26,0.70);
    text-decoration:none;
    border-bottom: 1px dashed rgba(17,19,26,0.30);
  }
  .song a:hover{ color: rgba(17,19,26,0.92); }

  .boost{ display:flex; flex-direction:column; gap:10px; }
  .quote{
    border-radius: 20px;
    border: 1px solid rgba(17,19,26,0.10);
    background: rgba(255,255,255,0.62);
    padding: 12px 12px;
  }
  .quote p{
    margin:0;
    font-weight: 950;
    font-size: 14px;
    line-height: 1.35;
    color: rgba(17,19,26,0.90);
  }
  .sub{ margin:8px 0 0; color: rgba(17,19,26,0.60); font-size: 12px; font-weight: 850; line-height: 1.45; }

  .meter{
    border-radius: 20px;
    border: 1px solid rgba(17,19,26,0.10);
    background: rgba(255,255,255,0.62);
    padding: 12px;
  }
  .bar{
    height: 10px;
    border-radius: 999px;
    background: rgba(17,19,26,0.10);
    overflow:hidden;
    border: 1px solid rgba(17,19,26,0.10);
  }
  .bar > div{
    height:100%;
    width: 10%;
    background: linear-gradient(90deg, var(--mood-accent), var(--mood-accent2));
    border-radius: 999px;
  }
  .meter-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:10px; }
  .meter-row .t{ font-weight: 950; color: rgba(17,19,26,0.84); font-size: 12px; }
  .meter-row .x{ font-weight: 950; color: rgba(17,19,26,0.62); font-size: 12px; }

  .toast{
    position:fixed; left:50%; bottom:18px;
    transform: translateX(-50%);
    z-index:99;
    padding:10px 12px;
    border-radius:999px;
    border:1px solid rgba(17,19,26,0.12);
    background: rgba(255,255,255,0.82);
    backdrop-filter: blur(10px);
    box-shadow: 0 18px 40px rgba(17,19,26,0.12);
    font-weight:950;
    font-size:12px;
    color: rgba(17,19,26,0.84);
    opacity:0;
    pointer-events:none;
    transition: opacity .18s ease, transform .18s ease;
  }
  .toast.show{
    opacity:1;
    transform: translateX(-50%) translateY(-4px);
  }

  .footer-wrap{
    position:relative; z-index:3;
    padding:18px 20px;
    border-top:1px solid rgba(17,19,26,0.06);
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(10px);
  }
  .footer{
    max-width:1380px;
    margin:0 auto;
    font-size:12px;
    color: rgba(17,19,26,0.62);
    line-height:1.45;
    text-align:center;
  }

  .enter{ opacity:0; transform: translateY(6px); }
  .enter.show{ opacity:1; transform: translateY(0); transition: opacity .22s ease, transform .22s ease; }

  .pillbtn:focus-visible, a.buy-pill:focus-visible, .mini-btn:focus-visible, a.watchlink:focus-visible{
    outline:2px solid rgba(17,19,26,0.26);
    outline-offset:2px;
  }
</style>
</head>

<body>
  <div class="haze"></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="grain"></div>

  <div class="toast" id="toast">Gekopieerd</div>

  <div class="wrap">
    <div class="container">
      <div class="topbar">
        <div class="hero">
          <div>
            <h1>MoodMakerz</h1>
            <div class="tagline">Kies je mood → krijg 4 plannen + een playlist.</div>
            <div class="subline">Druk op <b>Refresh</b> voor nieuwe sets (10×). Trending items kunnen er af en toe tussendoor komen.</div>
          </div>
          <div class="hero-right">
            <button class="pillbtn" id="refresh">Refresh</button>
          </div>
        </div>

        <div class="row">
          <div class="moods" id="moods"></div>
        </div>
      </div>

      <div class="grid" id="grid"></div>

      <section class="fun enter" id="fun">
        <div class="fun-inner">
          <div class="fun-card">
            <div class="fun-title">
              <h2>Playlist Picks</h2>
              <div class="pill" id="funPill">Set 1/10</div>
            </div>

            <div class="fun-actions">
              <button class="mini-btn" id="shuffleSongs">Shuffle songs</button>
              <button class="mini-btn" id="copySongs">Copy playlist</button>
            </div>

            <div class="songs" id="songs"></div>
          </div>

          <div class="boost">
            <div class="quote">
              <p id="quote">Loading…</p>
              <p class="sub" id="quoteSub">— MoodMakerz</p>
            </div>
            <div class="meter">
              <div class="meter-row">
                <div class="t">Progress</div>
                <div class="x" id="progText">1/10</div>
              </div>
              <div class="bar"><div id="progBar"></div></div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="footer-wrap">
      <div class="footer">

const moodsEl = document.getElementById("moods");
const grid = document.getElementById("grid");
const refreshBtn = document.getElementById("refresh");

const fun = document.getElementById("fun");
const funPill = document.getElementById("funPill");
const songsEl = document.getElementById("songs");
const shuffleSongsBtn = document.getElementById("shuffleSongs");
const copySongsBtn = document.getElementById("copySongs");

const quoteEl = document.getElementById("quote");
const quoteSub = document.getElementById("quoteSub");
const progText = document.getElementById("progText");
const progBar = document.getElementById("progBar");

const toast = document.getElementById("toast");

const STORAGE_KEY = "moodmakerz_full_trending_v1";
function loadState(){ try{ return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch(e){ return {}; } }
function saveState(s){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e){} }
let state = loadState();

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
}

function ensureMoodState(mood){
  if(!state[mood]) state[mood] = {};
  const ms = state[mood];
  if(!ms.order) ms.order = {};
  if(!ms.idx) ms.idx = {};
  if(typeof ms.refreshCount !== "number") ms.refreshCount = 0;
  if(typeof ms.songSig !== "number") ms.songSig = Math.floor(Math.random()*100000);

  for(const cat of ["products","eat","do","watch"]){
    const n = DATA[mood][cat].length;
    if(!ms.order[cat] || ms.order[cat].length !== n){
      ms.order[cat] = Array.from({length:n}, (_,i)=>i);
      shuffleArray(ms.order[cat]);
      ms.idx[cat] = 0;
    }
    if(typeof ms.idx[cat] !== "number") ms.idx[cat] = 0;
  }
  saveState(state);
}

function resetMoodRotation(mood){
  ensureMoodState(mood);
  const ms = state[mood];
  ms.refreshCount = 0;
  for(const cat of ["products","eat","do","watch"]){
    const n = DATA[mood][cat].length;
    ms.order[cat] = Array.from({length:n}, (_,i)=>i);
    shuffleArray(ms.order[cat]);
    ms.idx[cat] = 0;
  }
  saveState(state);
}

function nextBaseItem(mood, cat){
  ensureMoodState(mood);
  const ms = state[mood];
  const n = DATA[mood][cat].length;

  if(ms.idx[cat] >= n){
    ms.order[cat] = Array.from({length:n}, (_,i)=>i);
    shuffleArray(ms.order[cat]);
    ms.idx[cat] = 0;
  }

  const pickIndex = ms.order[cat][ms.idx[cat]++];
  saveState(state);
  return DATA[mood][cat][pickIndex];
}

function nextItem(mood, cat){
  ensureMoodState(mood);

  if(Math.random() < 0.25 && TRENDING[cat] && TRENDING[cat][mood]){
    const tList = TRENDING[cat][mood];
    const tItem = tList[Math.floor(Math.random() * tList.length)];
    return tItem;
  }

  return nextBaseItem(mood, cat);
}

function buildBatch(mood, k){
  ensureMoodState(mood);
  const used = { products:new Set(), eat:new Set(), do:new Set(), watch:new Set() };
  const out = [];

  for(let i=0;i<k;i++){
    const row = {};
    for(const cat of ["products","eat","do","watch"]){
      let item = nextItem(mood, cat);
      let safety = 0;
      while(used[cat].has(item.toLowerCase()) && safety < 120){
        item = nextItem(mood, cat);
        safety++;
      }
      used[cat].add(item.toLowerCase());
      row[cat] = item;
    }
    out.push(row);
  }
  return out;
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function pickQuote(mood){
  const q = QUOTES[mood] || ["Enjoy."];
  return q[Math.floor(Math.random()*q.length)];
}
function pickWhy(mood){
  const arr = WHY[mood] || ["Goed idee."];
  return arr[Math.floor(Math.random()*arr.length)];
}

function youtubeSearchUrl(query){
  return "https://www.youtube.com/results?search_query=" + encodeURIComponent(query);
}
function pickSongs(mood, n, sig){
  const list = (SONGS[mood] || []).slice();
  const shift = sig % Math.max(1, list.length);
  const rotated = list.slice(shift).concat(list.slice(0, shift));
  shuffleArray(rotated);
  return rotated.slice(0, n);
}

let lastSongs = [];
function renderSongs(mood){
  ensureMoodState(mood);
  const ms = state[mood];
  const picks = pickSongs(mood, SONGS_PER_REFRESH, ms.songSig);
  lastSongs = picks.slice();

  songsEl.innerHTML = "";
  picks.forEach(s=>{
    const el = document.createElement("div");
    el.className = "song enter";
    el.innerHTML = `
      <div class="note"></div>
      <div class="meta">
        <div class="title">${esc(s)}</div>
        <a href="${esc(youtubeSearchUrl(s))}" target="_blank" rel="noopener">Open in YouTube →</a>
      </div>
    `;
    songsEl.appendChild(el);
    requestAnimationFrame(()=>el.classList.add("show"));
  });
}

function applyMoodClass(mood){
  document.body.className = document.body.className
    .split(" ")
    .filter(c=>!c.startsWith("mood-"))
    .join(" ")
    .trim();
  document.body.classList.add("mood-" + mood);
}

let toastTimer = null;
function showToast(msg){
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove("show"), 1200);
}

let currentMood = Object.keys(DATA)[0];

function animateEnter(el){
  el.classList.add("enter");
  requestAnimationFrame(()=>el.classList.add("show"));
}

function render(full=true){
  ensureMoodState(currentMood);
  const ms = state[currentMood];

  if(full){
    if(ms.refreshCount >= MAX_REFRESHES){
      resetMoodRotation(currentMood);
    }
    ms.refreshCount += 1;
    saveState(state);
  }

  funPill.textContent = `Set ${ms.refreshCount}/${MAX_REFRESHES} • ${currentMood}`;
  progText.textContent = `${ms.refreshCount}/${MAX_REFRESHES}`;
  progBar.style.width = Math.max(5, Math.round((ms.refreshCount / MAX_REFRESHES) * 100)) + "%";
  quoteEl.textContent = pickQuote(currentMood);
  quoteSub.textContent = "— MoodMakerz";

  if(full){
    grid.innerHTML = "";
    const batch = buildBatch(currentMood, CARDS_PER_REFRESH);

    batch.forEach((b, idx) => {
      const card = document.createElement("div");
      card.className = "card";
      animateEnter(card);

      const productLink = amazonUrl(b.products);
      const isHighlight = (idx === 0);
      if(isHighlight) card.classList.add("highlight");

      const whyBlock = isHighlight ? `
        <div class="top-pick">
          <div class="tp">Top pick</div>
          <div class="tp-pill">Snelle win</div>
        </div>
        <div class="why">
          <div class="wlabel">Waarom dit werkt</div>
          <p class="wtext">${esc(pickWhy(currentMood))}</p>
        </div>
      ` : ``;

      const wUrl = watchUrl(b.watch);

      card.innerHTML = `
        <div class="cardhead">
          <div class="badge">${esc(currentMood)}</div>
          <div class="count">Set ${ms.refreshCount}/${MAX_REFRESHES} • #${idx+1}</div>
        </div>

        ${whyBlock}

        <div class="stack">
          <div class="section">
            <div class="label" data-k="product"><span class="dot"></span> Product</div>
            <p class="value short">${esc(b.products)}</p>
            <a class="buy-pill" href="${esc(productLink)}" target="_blank" rel="noopener">
              <span class="buy-ic"></span> Amazon.nl
            </a>
          </div>

          <div class="section">
            <div class="label" data-k="eat"><span class="dot"></span> Eten/Drinken</div>
            <p class="value">${esc(b.eat)}</p>
          </div>

          <div class="section">
            <div class="label" data-k="do"><span class="dot"></span> Doen</div>
            <p class="value">${esc(b.do)}</p>
          </div>

          <div class="section">
            <div class="label" data-k="watch"><span class="dot"></span> Serie/Film</div>
            <p class="value short">${esc(b.watch)}</p>
            <a class="watchlink" href="${esc(wUrl)}" target="_blank" rel="noopener">Where to watch →</a>
          </div>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  renderSongs(currentMood);
  if(!fun.classList.contains("show")) animateEnter(fun);
}

function setMood(mood){
  currentMood = mood;
  applyMoodClass(mood);

  document.querySelectorAll(".pillbtn[data-mood]").forEach(x=>x.classList.remove("active"));
  const btn = document.querySelector(`[data-mood="${CSS.escape(mood)}"]`);
  if(btn) btn.classList.add("active");

  render(true);
}

refreshBtn.onclick = () => render(true);

shuffleSongsBtn.onclick = () => {
  ensureMoodState(currentMood);
  state[currentMood].songSig += 1;
  saveState(state);
  render(false);
};

copySongsBtn.onclick = async () => {
  try{
    const text = `MoodMakerz — ${currentMood} playlist\n\n` + lastSongs.map((s,i)=>`${i+1}. ${s}`).join("\n");
    await navigator.clipboard.writeText(text);
    showToast("Playlist gekopieerd ✅");
  }catch(e){
    showToast("Kon niet kopiëren");
  }
};

Object.keys(DATA).forEach((m,i)=>{
  const b = document.createElement("div");
  b.className = "pillbtn" + (i===0 ? " active" : "");
  b.dataset.mood = m;
  b.textContent = m;
  b.onclick = () => setMood(m);
  moodsEl.appendChild(b);
});

applyMoodClass(currentMood);
ensureMoodState(currentMood);
render(true);
</script>
